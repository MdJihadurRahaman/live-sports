<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Md Jihadur Rahaman Live</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d1117;
color:white;
font-family:Arial,sans-serif;
text-align:center;
min-height:100vh;
}


h1{
margin-top:25px;
font-size:40px;
text-shadow:0 0 20px #00eaff;
}


.sub{
margin-top:10px;
font-size:20px;
color:#00eaff;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}


.live{
display:inline-block;
margin:20px;
background:red;
padding:8px 25px;
border-radius:30px;
font-weight:bold;
box-shadow:0 0 20px red;
}



.player{

width:90%;
max-width:1000px;
margin:20px auto;
background:black;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 25px black;

}


video{

width:100%;
height:auto;
display:block;
background:black;

}



button{

margin:20px;
padding:14px 35px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:17px;
cursor:pointer;

}


button:hover{
background:#00aaff;
}


.status{
margin:15px;
color:#aaa;
}


.footer{

margin-top:30px;
display:inline-block;
background:#0088cc;
padding:12px 45px;
border-radius:30px;

}

</style>

</head>


<body>


<h1>
Md Jihadur Rahaman
</h1>



<div class="sub">


<svg 
width="38"
height="25"
viewBox="0 0 36 24"
xmlns="http://www.w3.org/2000/svg">


<rect width="36" height="24" fill="#009c3b"/>

<polygon
points="18,3 33,12 18,21 3,12"
fill="#ffdf00"/>

<circle
cx="18"
cy="12"
r="5"
fill="#002776"/>

<path
d="M14 11.5c2.5-1.5 5.5-1.5 8 0"
stroke="white"
stroke-width="0.7"
fill="none"/>

</svg>


<span>
#SupportingBrazil
</span>


</div>



<div class="live">
● LIVE
</div>




<div class="player">


<video
id="video"
controls
autoplay
muted
playsinline>

</video>


</div>




<button onclick="playStream()">

ONE CLICK PLAY

</button>



<div class="status" id="status">
Connecting...
</div>



<div class="footer">
LinkedIn
</div>





<script>


const video =
document.getElementById("video");


const status =
document.getElementById("status");



const stream =

"https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-2/0/master_3000.m3u8?hdntl=Expires=1782667986~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AVXEwvc37dFUKGbQ0dUdyGFB9e8j-pC4-UVmGLize49cKF1QHePFJ7ZhXcBlcL7j6OUeKfpDZr_4ITmtn-YUkJb8GMMM";


let hls;



function playStream(){


if(hls){
hls.destroy();
}



if(Hls.isSupported()){


hls = new Hls({

enableWorker:true,

lowLatencyMode:true,

liveSyncDurationCount:3,

maxBufferLength:10

});



hls.loadSource(stream);

hls.attachMedia(video);



hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{


status.innerHTML="LIVE Connected";


video.play().catch(()=>{

status.innerHTML="Tap Play";

});


});



hls.on(
Hls.Events.ERROR,
(event,data)=>{


console.log(data);


if(data.fatal){

status.innerHTML="Stream Error";

}

});


}



else if(
video.canPlayType(
"application/vnd.apple.mpegurl"
)
){


video.src=stream;

video.play();


}


}




window.onload=function(){

playStream();

};



</script>


</body>

</html>
