<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Jihadur Rahaman Live</title>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        /* Real-time Clock Style */
        #clock {
            font-size: 14px;
            color: #00eaff;
            margin-top: 15px;
            font-family: monospace;
        }

        h1 {
            margin-top: 10px;
            font-size: 36px;
            text-shadow: 0 0 20px #00eaff;
            letter-spacing: 1px;
        }

        .sub {
            margin-top: 10px;
            font-size: 18px;
            color: #00eaff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* Pulse Animation for Live Button */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        .live {
            display: inline-block;
            margin: 20px;
            background: red;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        .player {
            width: 95%;
            max-width: 900px;
            margin: 20px auto;
            background: black;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #30363d;
        }

        video {
            width: 100%;
            display: block;
        }

        .controls-area {
            margin: 20px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00aaff;
            transform: translateY(-2px);
        }

        .status {
            margin: 10px;
            color: #8b949e;
            font-size: 14px;
        }

        /* LinkedIn Branding Section */
        .linkedin-footer {
            margin: 40px auto;
            padding: 20px;
            background: #161b22;
            border-top: 2px solid #0077b5;
            width: 100%;
            position: relative;
        }

        .linkedin-card {
            display: inline-flex;
            align-items: center;
            background: #0077b5;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
        }

        .linkedin-card:hover {
            background: #00a0dc;
            box-shadow: 0 6px 20px rgba(0, 119, 181, 0.5);
        }

        .linkedin-card i {
            font-size: 20px;
            margin-right: 10px;
        }

        .profile-id {
            display: block;
            margin-top: 10px;
            color: #58a6ff;
            font-size: 14px;
        }

    </style>
</head>

    <!-- Real-time Clock -->
    <div id="clock">Loading Time...</div>

    <h1>Md Jihadur Rahaman</h1>

    <div class="sub">
        <!-- Brazil Flag SVG -->
        <svg width="30" height="20" viewBox="0 0 36 24" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="24" fill="#009c3b" />
            <polygon points="18,3 33,12 18,21 3,12" fill="#ffdf00" />
            <circle cx="18" cy="12" r="5" fill="#002776" />
        </svg>
        <span>#SupportingBrazil</span>
    </div>

    <div class="live">● LIVE</div>

    <div class="player">
        <video id="video" controls autoplay muted playsinline></video>

    <div class="controls-area">
        <button onclick="playStream()">
            <i class="fas fa-sync-alt"></i> Refresh Server
        </button>
        <div class="status" id="status">Connecting to secure server...</div>
    </div>

    <!-- LinkedIn Real-time Branding Section -->
    <div class="linkedin-footer">
        <p style="margin-bottom: 15px; color: #8b949e;">Connect with me in real-time</p>
        <a href="https://www.linkedin.com/in/mdjihadurrahaman" target="_blank" class="linkedin-card">
            <i class="fab fa-linkedin"></i>
            Follow /mdjihadurrahaman
        </a>
        <span class="profile-id">Verified Professional Profile</span>
    </div>

    <script>
        // Real-time Clock Function
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock').innerText = "Real-time: " + now.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Video Player Logic
        const video = document.getElementById("video");
        const status = document.getElementById("status");
        const stream = "https://1nyaler.streamhostingcdn.top/stream/26/index.m3u8";
        let hls;

        function playStream() {
            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    liveSyncDurationCount: 3
                });

                        status.innerHTML = "Tap Play to Start Stream";
                    });
