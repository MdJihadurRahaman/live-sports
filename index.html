<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Jihadur Rahaman - Live Stream</title>
    <style>
        /* কালার প্যালেট ও গ্লোবাল স্টাইল */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-color: #ffffff;
            --accent-glow: rgba(59, 130, 246, 0.6);
            --live-red: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* হেডার ও নাম */
        .header-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .user-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
            /* টেক্সট গ্লো ইফেক্ট */
            text-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
        }

        /* হ্যাশট্যাগ ও ব্রাসিল SVG লোগো */
        .hashtag-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #38bdf8;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .brasil-flag {
            width: 24px;
            height: 17px;
            display: inline-block;
            vertical-align: middle;
        }

        /* লাইভ ব্যাজ */
        .live-badge {
            background-color: var(--live-red);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: white;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .player-wrapper {
            width: 90%;
            max-width: 900px;
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* আইফ্রেম রেসপনসিভনেস নিশ্চিত করা */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 500px; /* আপনার রিকোয়ার্ড হাইট */
            background-color: #000;
        }

        .iframe-container iframe {
            border: 0;
            width: 100%;
            height: 100%;
        }

        /* মোবাইল ফ্রেন্ডলি রেসপনসিভ ডিজাইন */
        @media (max-width: 768px) {
            .user-name {
                font-size: 1.8rem;
            }
            .iframe-container {
                height: 350px; /* ছোট স্ক্রিনের জন্য হাইট কিছুটা কমানো হলো */
            }
        }
        @media (max-width: 480px) {
            .iframe-container {
                height: 240px;
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="user-name">Md Jihadur Rahaman</h1>
        
        <div class="hashtag-container">
            <span>#SupportingBrazil</span>
            <svg class="brasil-flag" viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg">
                <rect width="720" height="500" fill="#009c3b"/>
                <polygon points="360,40 680,250 360,460 40,250" fill="#ffdf00"/>
                <circle cx="360" cy="250" r="120" fill="#002776"/>
                <path d="M 242,263 Q 360,210 478,263 Q 360,222 242,263" fill="#fff"/>
                <circle cx="360" cy="180" r="3.5" fill="#fff"/>
                <circle cx="320" cy="220" r="3" fill="#fff"/>
                <circle cx="400" cy="230" r="3" fill="#fff"/>
                <circle cx="350" cy="280" r="4" fill="#fff"/>
                <circle cx="380" cy="275" r="3.5" fill="#fff"/>
            </svg>
        </div>

        <div class="live-badge">Live</div>
    </div>

    <div class="player-wrapper">
        <div class="iframe-container">
            <iframe src="//cdn.stmify.com/embed-free/v1/tsn-1-ca-jw" width="100%" height="500px" marginheight="0" marginwidth="0" scrolling="no" frameborder="0" allowfullscreen allow="encrypted-media"></iframe>
        </div>
    </div>

</body>
</html>
