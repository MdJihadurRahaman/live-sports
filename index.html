<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Jihadur Rahaman - Live Stream (Method 2)</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --accent-glow: rgba(59, 130, 246, 0.6);
            --live-red: #ef4444;
        }
        body {
            margin: 0; padding: 20px; background-color: var(--bg-color); color: #fff;
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .user-name { font-size: 2.2rem; font-weight: 700; margin: 0 0 8px 0; text-shadow: 0 0 10px var(--accent-glow); }
        .hashtag { color: #38bdf8; font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; }
        .live-badge { background-color: var(--live-red); color: white; font-size: 0.75rem; font-weight: bold; padding: 4px 12px; border-radius: 12px; text-transform: uppercase; margin-bottom: 20px;}
        #player { width: 100%; max-width: 900px; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body>

    <h1 class="user-name">Md Jihadur Rahaman</h1>
    <div class="hashtag">#SupportingBrazil</div>
    <div class="live-badge">Live</div>
    
    <div id="player"></div>

    <script>
        var player = new Clappr.Player({
            source: "https://prod-cdn01-live.toffeelive.com/live/FIFA-2026/0/master_1750.m3u8",
            parentId: "#player",
            width: "100%",
            height: "100%",
            autoPlay: true,
            mute: true, // ব্রাউজার পলিসির জন্য অটো-প্লে করতে মিউট রাখা জরুরি
            mimeType: "application/x-mpegURL"
        });
    </script>
</body>
</html>
